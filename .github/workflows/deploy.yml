name: Deploy to Netlify

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Netlify
        run: npx netlify-cli@latest deploy --prod --dir=. --site=abcd2980-f79e-4e53-bfea-24718d279f7e
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
